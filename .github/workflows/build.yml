name: Build YouTube Downloader

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 yt-dlp

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg_temp
          move ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe ffmpeg.exe
          move ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe ffprobe.exe

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name=YouTube-Downloader --hidden-import=PyQt5 --hidden-import=yt_dlp --hidden-import=urllib3 --hidden-import=certifi --hidden-import=requests --add-binary="ffmpeg.exe;." --add-binary="ffprobe.exe;." src/youtube_gui_pyqt.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Downloader-Windows
          path: dist/YouTube-Downloader.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 yt-dlp

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build app
        run: |
          FFMPEG_PATH=$(which ffmpeg)
          FFPROBE_PATH=$(which ffprobe)
          pyinstaller --onefile --windowed --name=YouTube-Downloader --osx-bundle-identifier=com.youtube.downloader --hidden-import=PyQt5 --hidden-import=yt_dlp --hidden-import=urllib3 --hidden-import=certifi --hidden-import=requests --add-binary="${FFMPEG_PATH}:." --add-binary="${FFPROBE_PATH}:." src/youtube_gui_pyqt.py

      - name: Create DMG
        run: |
          hdiutil create -volname "YouTube Downloader" -srcfolder dist/YouTube-Downloader.app -ov -format UDZO dist/YouTube-Downloader.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Downloader-macOS
          path: dist/YouTube-Downloader.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: YouTube-Downloader-Windows
          path: windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: YouTube-Downloader-macOS
          path: macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows/YouTube-Downloader.exe
            macos/YouTube-Downloader.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
